<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f2f2f2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded white square background -->
  <rect x="40" y="40" width="432" height="432" rx="96" ry="96"
        fill="url(#bgGradient)"
        filter="url(#shadow)" />

  <!--
    Smooth rounded "P":
    - Stem with fully rounded top-left and bottom-left corners
    - Bowl is a true semicircle using cubic bezier curves
    - Thick strokes, very smooth and modern
  -->
  <path
    d="
      M 158 392
      L 158 148
      C 158 136 166 128 178 128
      L 268 128
      C 336 128 384 164 384 210
      C 384 256 336 292 268 292
      L 200 292
      L 200 392
      C 200 392 158 392 158 392
      Z

      M 200 165
      L 264 165
      C 312 165 342 184 342 210
      C 342 236 312 255 264 255
      L 200 255
      Z
    "
    fill="#1a1a2e"
    fill-rule="evenodd"
    stroke="#1a1a2e"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Small red PDF accent dot -->
  <circle cx="256" cy="418" r="16" fill="#E63946" opacity="0.85"/>
</svg>
